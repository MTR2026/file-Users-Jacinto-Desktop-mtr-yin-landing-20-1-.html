<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTR YIN — Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#f0ede8; font-family:'Barlow',sans-serif; min-height:100vh; }

  /* LOGIN */
  .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px 20px; }
  .logo-block { text-align:center; margin-bottom:40px; }
  .logo-block .eyebrow { font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:#b0aca5; margin-bottom:10px; }
  .logo-block h1 { font-family:'Barlow Condensed',sans-serif; font-size:52px; font-weight:900; line-height:0.9; }
  .logo-block .sep { width:100%; height:4px; background:#f0ede8; margin:5px 0; }
  .logo-block .sub { font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color:#b0aca5; margin-top:8px; }
  .login-input { width:100%; max-width:320px; background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.2); color:#f0ede8; font-family:'Barlow',sans-serif; font-size:16px; padding:14px 16px; outline:none; margin-bottom:12px; text-align:center; }
  .login-input::placeholder { color:rgba(240,237,232,0.3); }
  .login-btn { width:100%; max-width:320px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; letter-spacing:0.25em; text-transform:uppercase; background:#f0ede8; color:#0a0a0a; border:none; padding:16px; cursor:pointer; }
  .login-btn:hover { opacity:0.88; }
  #login-error { color:#e74c3c; font-size:13px; margin-top:8px; min-height:20px; }

  /* DASHBOARD */
  .dashboard { display:none; flex-direction:column; min-height:100vh; }

  /* TOP BAR */
  .topbar { background:#111; border-bottom:1px solid rgba(240,237,232,0.08); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:10; }
  .topbar-logo { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; }
  .topbar-actions { display:flex; gap:8px; align-items:center; }
  .btn-sm { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; background:transparent; border:1px solid rgba(240,237,232,0.2); color:#f0ede8; padding:8px 16px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn-sm:hover { background:rgba(240,237,232,0.08); }
  .btn-sm.primary { background:#f0ede8; color:#0a0a0a; border-color:#f0ede8; }
  .btn-sm.primary:hover { opacity:0.88; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:1px; background:rgba(240,237,232,0.08); border-bottom:1px solid rgba(240,237,232,0.08); }
  .stat-card { background:#0a0a0a; padding:24px 20px; }
  .stat-label { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:#b0aca5; margin-bottom:8px; }
  .stat-value { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:900; line-height:1; }
  .stat-value.green { color:#2ecc71; }
  .stat-value.orange { color:#f39c12; }
  .stat-value.blue { color:#3498db; }

  /* FILTERS */
  .filters { padding:16px 24px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; border-bottom:1px solid rgba(240,237,232,0.06); }
  .search-input { background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.15); color:#f0ede8; font-family:'Barlow',sans-serif; font-size:14px; padding:10px 14px; outline:none; flex:1; min-width:200px; }
  .search-input::placeholder { color:rgba(240,237,232,0.3); }
  .filter-btn { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; background:transparent; border:1px solid rgba(240,237,232,0.15); color:#b0aca5; padding:8px 14px; cursor:pointer; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:rgba(240,237,232,0.08); border-color:rgba(240,237,232,0.4); color:#f0ede8; }
  .filter-btn.used-filter.active { border-color:#2ecc71; color:#2ecc71; }
  .filter-btn.pending-filter.active { border-color:#f39c12; color:#f39c12; }

  /* TABLE */
  .table-container { flex:1; overflow-x:auto; padding:0 24px 24px; }
  table { width:100%; border-collapse:collapse; min-width:600px; margin-top:16px; }
  thead th { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#b0aca5; padding:10px 12px; text-align:left; border-bottom:1px solid rgba(240,237,232,0.1); white-space:nowrap; }
  tbody tr { border-bottom:1px solid rgba(240,237,232,0.04); transition:background 0.15s; }
  tbody tr:hover { background:rgba(240,237,232,0.03); }
  tbody td { padding:12px; font-size:13px; color:#f0ede8; vertical-align:middle; }
  tbody td.dim { color:#b0aca5; }
  .badge { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; padding:3px 10px; }
  .badge.used { background:rgba(46,204,113,0.12); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }
  .badge.pending { background:rgba(243,156,18,0.12); color:#f39c12; border:1px solid rgba(243,156,18,0.3); }
  .badge.general { background:rgba(240,237,232,0.06); color:#b0aca5; border:1px solid rgba(240,237,232,0.1); }
  .badge.primera { background:rgba(52,152,219,0.1); color:#3498db; border:1px solid rgba(52,152,219,0.2); }
  .badge.vip { background:rgba(155,89,182,0.1); color:#9b59b6; border:1px solid rgba(155,89,182,0.2); }
  .code-mono { font-family:monospace; font-size:11px; color:rgba(240,237,232,0.4); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:#b0aca5; }
  .empty-state p { font-size:14px; margin-top:8px; }

  /* LOADING */
  .loading { text-align:center; padding:60px 20px; color:#b0aca5; font-size:13px; letter-spacing:0.1em; }

  /* RESPONSIVE */
  @media (max-width:600px) {
    .topbar { padding:12px 16px; }
    .filters { padding:12px 16px; }
    .table-container { padding:0 16px 16px; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="logo-block">
    <p class="eyebrow">Muay Thai Revolution</p>
    <h1>MTR</h1>
    <div class="sep"></div>
    <h1>YIN</h1>
    <p class="sub">Panel de Control · Entradas</p>
  </div>
  <input type="password" class="login-input" id="secret-input" placeholder="Clave de administración" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">Acceder</button>
  <p id="login-error"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="topbar">
    <div class="topbar-logo">MTR YIN · Entradas</div>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="loadTickets()">↻ Actualizar</button>
      <button class="btn-sm" onclick="exportCSV()">Exportar CSV</button>
      <button class="btn-sm primary" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><p class="stat-label">Total entradas</p><p class="stat-value" id="stat-total">—</p></div>
    <div class="stat-card"><p class="stat-label">Validadas</p><p class="stat-value green" id="stat-used">—</p></div>
    <div class="stat-card"><p class="stat-label">Pendientes</p><p class="stat-value orange" id="stat-pending">—</p></div>
    <div class="stat-card"><p class="stat-label">General</p><p class="stat-value" id="stat-general">—</p></div>
    <div class="stat-card"><p class="stat-label">Primera Fila</p><p class="stat-value blue" id="stat-primera">—</p></div>
    <div class="stat-card"><p class="stat-label">VIP + Cena</p><p class="stat-value" id="stat-vip">—</p></div>
  </div>

  <div class="filters">
    <input type="text" class="search-input" id="search-input" placeholder="Buscar por nombre, email, código o escuela..." oninput="filterTickets()">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Todas</button>
    <button class="filter-btn used-filter" id="filter-used" onclick="setFilter('used')">Validadas</button>
    <button class="filter-btn pending-filter" id="filter-pending" onclick="setFilter('pending')">Pendientes</button>
  </div>

  <div class="table-container">
    <div class="loading" id="loading">Cargando entradas...</div>
    <table id="tickets-table" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Estado</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Tipo</th>
          <th>Entrada</th>
          <th>Escuela</th>
          <th>Validada</th>
          <th>Código</th>
        </tr>
      </thead>
      <tbody id="tickets-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">
      <p style="font-size:32px;">🎟️</p>
      <p>No hay entradas que coincidan</p>
    </div>
  </div>
</div>

<script>
  let adminSecret = '';
  let allTickets = [];
  let currentFilter = 'all';

  function doLogin() {
    const val = document.getElementById('secret-input').value.trim();
    if (!val) { document.getElementById('login-error').textContent = 'Introduce la clave.'; return; }
    adminSecret = val;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    loadTickets();
  }

  document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function logout() {
    adminSecret = '';
    allTickets = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('secret-input').value = '';
  }

  async function loadTickets() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('tickets-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';

    try {
      const res = await fetch('/.netlify/functions/validate-ticket?action=list', {
        headers: { 'x-admin-secret': adminSecret },
      });

      if (res.status === 401) { document.getElementById('login-error').textContent = 'Clave incorrecta.'; logout(); return; }

      const data = await res.json();
      allTickets = data.tickets || [];
      renderStats();
      filterTickets();
    } catch (err) {
      document.getElementById('loading').textContent = 'Error de conexión. Inténtalo de nuevo.';
    }
  }

  function renderStats() {
    const total = allTickets.length;
    const used = allTickets.filter(t => t.used).length;
    const pending = total - used;
    const general = allTickets.filter(t => t.ticket_type === 'general').length;
    const primera = allTickets.filter(t => t.ticket_type === 'primera_fila').length;
    const vip = allTickets.filter(t => t.ticket_type === 'vip_cena').length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-used').textContent = used;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-general').textContent = general;
    document.getElementById('stat-primera').textContent = primera;
    document.getElementById('stat-vip').textContent = vip;
  }

  function setFilter(f) {
    currentFilter = f;
    ['all','used','pending'].forEach(x => {
      document.getElementById(`filter-${x}`).classList.toggle('active', x === f);
    });
    filterTickets();
  }

  function filterTickets() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = allTickets;

    if (currentFilter === 'used') filtered = filtered.filter(t => t.used);
    if (currentFilter === 'pending') filtered = filtered.filter(t => !t.used);

    if (search) {
      filtered = filtered.filter(t =>
        (t.buyer_name || '').toLowerCase().includes(search) ||
        (t.buyer_email || '').toLowerCase().includes(search) ||
        (t.code || '').toLowerCase().includes(search) ||
        (t.school || '').toLowerCase().includes(search)
      );
    }

    renderTable(filtered);
  }

  function renderTable(tickets) {
    document.getElementById('loading').style.display = 'none';

    if (tickets.length === 0) {
      document.getElementById('tickets-table').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('tickets-table').style.display = 'table';

    const tbody = document.getElementById('tickets-body');
    tbody.innerHTML = tickets.map((t, i) => {
      const typeBadge = t.ticket_type === 'primera_fila' ? 'primera' : t.ticket_type === 'vip_cena' ? 'vip' : 'general';
      const typeLabel = t.ticket_type === 'primera_fila' ? 'Primera Fila' : t.ticket_type === 'vip_cena' ? 'VIP + Cena' : 'General';
      const usedAt = t.used_at ? new Date(t.used_at).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';
      const entryNum = t.entry_number ? `#${String(t.entry_number).padStart(4,'0')}` : '—';

      return `<tr>
        <td class="dim">${i + 1}</td>
        <td><span class="badge ${t.used ? 'used' : 'pending'}">${t.used ? 'Validada' : 'Pendiente'}</span></td>
        <td>${t.buyer_name || '—'}</td>
        <td class="dim">${t.buyer_email || '—'}</td>
        <td><span class="badge ${typeBadge}">${typeLabel}</span></td>
        <td class="dim">${entryNum}</td>
        <td class="dim">${t.school || '—'}</td>
        <td class="dim">${usedAt}</td>
        <td class="code-mono">${t.code}</td>
      </tr>`;
    }).join('');
  }

  function exportCSV() {
    if (!allTickets.length) return;
    const headers = ['Código','Nombre','Email','Tipo','Entrada','Escuela','PVP','Estado','Validada'];
    const rows = allTickets.map(t => [
      t.code, t.buyer_name || '', t.buyer_email || '',
      t.ticket_name || t.ticket_type,
      t.entry_number ? `#${String(t.entry_number).padStart(4,'0')}` : '',
      t.school || '', t.pvp ? `${t.pvp}€` : '',
      t.used ? 'Validada' : 'Pendiente',
      t.used_at ? new Date(t.used_at).toLocaleString('es-ES') : '',
    ]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `mtryin-entradas-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // Auto-refresh cada 30 segundos si está logueado
  setInterval(() => { if (adminSecret) loadTickets(); }, 30000);
</script>
</body>
</html>
