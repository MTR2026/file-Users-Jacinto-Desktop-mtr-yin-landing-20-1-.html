<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTR YIN — Panel Admin: Entradas Escuelas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#f0ede8; font-family:'Barlow',sans-serif; min-height:100vh; padding:40px 20px; }
  .container { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:48px; }
  header .badge { font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:#b0aca5; margin-bottom:12px; }
  header h1 { font-family:'Barlow Condensed',sans-serif; font-size:48px; font-weight:900; line-height:0.9; }
  header .sep { width:100%; height:4px; background:#f0ede8; margin:6px 0; }
  header .sub { font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#b0aca5; margin-top:10px; }
  .admin-badge { display:inline-block; background:rgba(240,237,232,0.08); border:1px solid rgba(240,237,232,0.15); font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:#b0aca5; padding:6px 16px; margin-top:16px; }

  .card { background:#1a1a18; border:1px solid rgba(240,237,232,0.1); padding:40px; margin-bottom:24px; }
  .form-group { margin-bottom:20px; }
  label { display:block; font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:#b0aca5; margin-bottom:8px; }
  input, select, textarea {
    width:100%; background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.15);
    color:#f0ede8; font-family:'Barlow',sans-serif; font-size:15px; padding:12px 16px; outline:none;
    -webkit-appearance:none; transition:border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color:rgba(240,237,232,0.4); }
  input::placeholder, textarea::placeholder { color:rgba(240,237,232,0.25); }
  select option { background:#1a1a18; }
  textarea { resize:vertical; min-height:80px; }

  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  .secret-row { display:flex; gap:12px; align-items:flex-end; }
  .secret-row input { flex:1; }

  .submit-btn {
    width:100%; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800;
    letter-spacing:0.25em; text-transform:uppercase; background:#f0ede8; color:#0a0a0a;
    border:none; padding:18px; cursor:pointer; transition:opacity 0.2s; margin-top:8px;
  }
  .submit-btn:hover { opacity:0.88; }
  .submit-btn:disabled { opacity:0.35; cursor:not-allowed; }

  #result { margin-top:24px; padding:20px; border:1px solid rgba(240,237,232,0.1); font-size:14px; line-height:1.7; display:none; }
  #result.success { border-color:#2ecc71; color:#2ecc71; }
  #result.error { border-color:#e74c3c; color:#e74c3c; }

  .codes-list { margin-top:12px; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.3); padding:12px; border-radius:2px; }
  .codes-list div { padding:4px 0; border-bottom:1px solid rgba(240,237,232,0.06); }
  .codes-list div:last-child { border:none; }

  .warning-box { background:rgba(200,57,43,0.08); border:1px solid rgba(200,57,43,0.25); padding:16px 20px; margin-bottom:32px; }
  .warning-box p { font-size:13px; color:rgba(240,237,232,0.6); line-height:1.6; }
  .warning-box strong { color:#f0ede8; }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="badge">Muay Thai Revolution</p>
    <h1>MTR</h1>
    <div class="sep"></div>
    <h1>YIN</h1>
    <p class="sub">Panel de Administración</p>
    <span class="admin-badge">🔒 Solo uso interno</span>
  </header>

  <div class="warning-box">
    <p><strong>Uso exclusivo para escuelas participantes.</strong><br>
    Las entradas generadas aquí tienen acceso completo pero no muestran precio. Para su distribución en efectivo por parte de las escuelas.</p>
  </div>

  <div class="card">
    <div class="form-group secret-row">
      <div style="flex:1">
        <label>Clave de administración</label>
        <input type="password" id="admin-secret" placeholder="Tu ADMIN_SECRET de Netlify">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Nombre del destinatario</label>
        <input type="text" id="name" placeholder="Elena García">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="elena@gimnasio.com">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Tipo de acceso</label>
        <select id="ticket-type">
          <option value="general">General</option>
          <option value="primera_fila">Primera Fila</option>
          <option value="vip_cena">VIP + Cena</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cantidad de entradas</label>
        <select id="qty">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
          <option value="16">16</option>
          <option value="17">17</option>
          <option value="18">18</option>
          <option value="19">19</option>
          <option value="20">20</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Escuela / Gimnasio</label>
      <input type="text" id="school" placeholder="Gym Muay Thai Madrid">
    </div>

    <div class="form-group">
      <label>Nota interna (opcional)</label>
      <textarea id="note" placeholder="Ej: Entradas para equipo técnico del evento..."></textarea>
    </div>

    <button class="submit-btn" id="send-btn" onclick="sendFreeTickets()">
      Generar y enviar entradas
    </button>
  </div>

  <div id="result"></div>
</div>

<script>
  async function sendFreeTickets() {
    const secret = document.getElementById('admin-secret').value.trim();
    const name   = document.getElementById('name').value.trim();
    const email  = document.getElementById('email').value.trim();
    const type   = document.getElementById('ticket-type').value;
    const qty    = document.getElementById('qty').value;
    const school = document.getElementById('school').value.trim();
    const note   = document.getElementById('note').value.trim();
    const btn    = document.getElementById('send-btn');
    const result = document.getElementById('result');

    result.style.display = 'none';
    result.className = '';

    if (!secret) { showResult('Introduce la clave de administración.', 'error'); return; }
    if (!email || !email.includes('@')) { showResult('Email inválido.', 'error'); return; }
    if (!name) { showResult('Introduce el nombre del destinatario.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Generando entradas...';

    try {
      const res = await fetch('/.netlify/functions/generate-free-ticket', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-secret': secret,
        },
        body: JSON.stringify({ email, name, ticketType: type, qty: parseInt(qty), school, note }),
      });

      const data = await res.json();

      if (!res.ok) {
        showResult('Error: ' + (data.error || 'Error desconocido'), 'error');
      } else {
        const codesHtml = data.codes
          ? '<div class="codes-list">' + data.codes.map(c => `<div>${c}</div>`).join('') + '</div>'
          : '';
        showResult(
          `✓ ${data.message}<br><br>Códigos generados:${codesHtml}`,
          'success'
        );
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('school').value = '';
        document.getElementById('note').value = '';
      }
    } catch (err) {
      showResult('Error de conexión: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Generar y enviar entradas';
  }

  function showResult(html, type) {
    const result = document.getElementById('result');
    result.innerHTML = html;
    result.className = type;
    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
