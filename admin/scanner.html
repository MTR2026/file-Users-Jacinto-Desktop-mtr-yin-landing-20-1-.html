<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MTR YIN — Lector de Entradas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#f0ede8; font-family:'Barlow',sans-serif; min-height:100vh; }

  .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px 20px; }
  .login-screen h1 { font-family:'Barlow Condensed',sans-serif; font-size:56px; font-weight:900; line-height:0.9; text-align:center; margin-bottom:32px; }
  .sep { width:100%; height:4px; background:#f0ede8; margin:6px 0; }
  .login-screen input { width:100%; max-width:320px; background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.2); color:#f0ede8; font-family:'Barlow',sans-serif; font-size:16px; padding:14px 16px; outline:none; margin-bottom:12px; text-align:center; letter-spacing:0.1em; }
  .login-screen input::placeholder { color:rgba(240,237,232,0.3); }
  .login-btn { width:100%; max-width:320px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; letter-spacing:0.25em; text-transform:uppercase; background:#f0ede8; color:#0a0a0a; border:none; padding:16px; cursor:pointer; }

  .scanner-screen { display:none; flex-direction:column; min-height:100vh; }

  .top-bar { background:#111; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(240,237,232,0.1); }
  .top-bar .logo { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; }
  .top-bar .counter { font-size:12px; color:#b0aca5; text-align:right; }
  .top-bar .counter span { display:block; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:#f0ede8; }

  #reader-container { position:relative; width:100%; }
  #reader { width:100% !important; }
  #reader video { width:100% !important; object-fit:cover; }

  .scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .scan-frame { width:220px; height:220px; position:relative; }
  .scan-frame::before, .scan-frame::after { content:''; position:absolute; width:40px; height:40px; border-color:#f0ede8; border-style:solid; }
  .scan-frame::before { top:0; left:0; border-width:3px 0 0 3px; }
  .scan-frame::after { bottom:0; right:0; border-width:0 3px 3px 0; }
  .scan-frame .corner-tr { position:absolute; top:0; right:0; width:40px; height:40px; border-top:3px solid #f0ede8; border-right:3px solid #f0ede8; }
  .scan-frame .corner-bl { position:absolute; bottom:0; left:0; width:40px; height:40px; border-bottom:3px solid #f0ede8; border-left:3px solid #f0ede8; }
  .scan-line { position:absolute; left:10px; right:10px; height:2px; background:linear-gradient(90deg, transparent, #f0ede8, transparent); animation: scanline 2s linear infinite; top:50%; }
  @keyframes scanline { 0%,100% { transform:translateY(-100px); opacity:0; } 10%,90% { opacity:1; } 50% { transform:translateY(100px); } }

  .manual-section { padding:16px; border-top:1px solid rgba(240,237,232,0.1); }
  .manual-section label { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:#b0aca5; display:block; margin-bottom:8px; }
  .manual-row { display:flex; gap:8px; }
  .manual-row input { flex:1; background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.15); color:#f0ede8; font-family:monospace; font-size:14px; padding:12px; outline:none; }
  .manual-row input::placeholder { color:rgba(240,237,232,0.25); font-family:'Barlow',sans-serif; font-size:12px; }
  .manual-row button { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; background:#f0ede8; color:#0a0a0a; border:none; padding:0 20px; cursor:pointer; white-space:nowrap; }

  /* Result overlay */
  .result-overlay { display:none; position:fixed; inset:0; z-index:100; align-items:center; justify-content:center; padding:20px; }
  .result-overlay.show { display:flex; }
  .result-overlay.valid-bg { background:rgba(0,20,0,0.95); }
  .result-overlay.invalid-bg { background:rgba(20,0,0,0.95); }
  .result-overlay.used-bg { background:rgba(20,10,0,0.95); }

  .result-card { width:100%; max-width:360px; padding:32px; text-align:center; }
  .result-icon { font-size:64px; margin-bottom:16px; }
  .result-status { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:900; margin-bottom:8px; }
  .result-status.ok { color:#2ecc71; }
  .result-status.ko { color:#e74c3c; }
  .result-status.warn { color:#f39c12; }

  .ticket-info { background:rgba(240,237,232,0.05); border:1px solid rgba(240,237,232,0.1); padding:20px; margin:20px 0; text-align:left; }
  .ticket-info-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(240,237,232,0.06); font-size:14px; }
  .ticket-info-row:last-child { border:none; }
  .ticket-info-row .lbl { color:#b0aca5; }
  .ticket-info-row .val { color:#f0ede8; font-weight:500; text-align:right; max-width:60%; }

  .result-code { font-family:monospace; font-size:12px; color:rgba(240,237,232,0.4); margin-bottom:20px; }
  .close-btn { width:100%; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; border:none; padding:16px; cursor:pointer; }
  .close-btn.ok { background:#2ecc71; color:#0a0a0a; }
  .close-btn.ko { background:#e74c3c; color:#f0ede8; }
  .close-btn.warn { background:#f39c12; color:#0a0a0a; }

  .used-time { font-size:13px; color:rgba(240,237,232,0.5); margin-bottom:16px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div>
    <p style="font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:#b0aca5;text-align:center;margin-bottom:12px;">Muay Thai Revolution</p>
    <h1>MTR<div class="sep"></div>YIN</h1>
    <p style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#b0aca5;text-align:center;margin-top:8px;margin-bottom:40px;">Validador de Entradas</p>
  </div>
  <input type="password" id="secret-input" placeholder="Clave de acceso" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">Entrar</button>
  <p id="login-error" style="color:#e74c3c;font-size:13px;margin-top:12px;min-height:20px;"></p>
</div>

<!-- SCANNER -->
<div class="scanner-screen" id="scanner-screen">
  <div class="top-bar">
    <div class="logo">MTR YIN</div>
    <div class="counter">
      Validadas hoy
      <span id="validated-count">0</span>
    </div>
  </div>

  <div id="reader-container">
    <div id="reader"></div>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <div class="manual-section">
    <label>O introduce el código manualmente</label>
    <div class="manual-row">
      <input type="text" id="manual-code" placeholder="MTRYIN-XXXX-XXXX-XXXX" style="text-transform:uppercase;">
      <button onclick="validateManual()">Validar</button>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="result-icon">✓</div>
    <div class="result-status" id="result-status">VÁLIDA</div>
    <div class="result-code" id="result-code"></div>
    <div class="ticket-info" id="ticket-info"></div>
    <div class="used-time" id="used-time"></div>
    <button class="close-btn" id="close-btn" onclick="closeResult()">Siguiente entrada</button>
  </div>
</div>

<script>
  let adminSecret = '';
  let validatedCount = 0;
  let qrScanner = null;
  let isProcessing = false;

  function doLogin() {
    const val = document.getElementById('secret-input').value.trim();
    if (!val) { document.getElementById('login-error').textContent = 'Introduce la clave.'; return; }
    adminSecret = val;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('scanner-screen').style.display = 'flex';
    initScanner();
  }

  document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function initScanner() {
    qrScanner = new Html5Qrcode('reader');
    qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      (decodedText) => {
        if (!isProcessing) validateCode(decodedText.trim().toUpperCase());
      },
      () => {}
    ).catch(err => console.warn('Camera error:', err));
  }

  function validateManual() {
    const code = document.getElementById('manual-code').value.trim().toUpperCase();
    if (!code) return;
    validateCode(code);
    document.getElementById('manual-code').value = '';
  }

  document.getElementById('manual-code').addEventListener('keydown', e => { if (e.key === 'Enter') validateManual(); });

  async function validateCode(code) {
    if (isProcessing) return;
    isProcessing = true;

    try {
      const res = await fetch('/.netlify/functions/validate-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
        body: JSON.stringify({ action: 'validate', code }),
      });
      const data = await res.json();

      if (res.status === 401) {
        showResult('invalid', null, code, 'Clave incorrecta');
        return;
      }

      if (res.status === 404 || !data.valid && !data.already_used) {
        showResult('invalid', null, code, 'Entrada no encontrada');
        return;
      }

      if (data.already_used) {
        showResult('used', data.ticket, code, null, data.used_at);
        return;
      }

      if (data.valid) {
        validatedCount++;
        document.getElementById('validated-count').textContent = validatedCount;
        showResult('valid', data.ticket, code);
      }

    } catch (err) {
      showResult('invalid', null, code, 'Error de conexión');
    }
  }

  function showResult(type, ticket, code, errorMsg, usedAt) {
    const overlay = document.getElementById('result-overlay');
    const icon = document.getElementById('result-icon');
    const status = document.getElementById('result-status');
    const codeEl = document.getElementById('result-code');
    const infoEl = document.getElementById('ticket-info');
    const usedEl = document.getElementById('used-time');
    const btn = document.getElementById('close-btn');

    codeEl.textContent = code;
    usedEl.textContent = '';
    infoEl.innerHTML = '';

    if (type === 'valid') {
      overlay.className = 'result-overlay show valid-bg';
      icon.textContent = '✓';
      status.textContent = 'ENTRADA VÁLIDA';
      status.className = 'result-status ok';
      btn.className = 'close-btn ok';
      if (ticket) infoEl.innerHTML = buildTicketInfo(ticket);
    } else if (type === 'used') {
      overlay.className = 'result-overlay show used-bg';
      icon.textContent = '⚠';
      status.textContent = 'YA USADA';
      status.className = 'result-status warn';
      btn.className = 'close-btn warn';
      if (ticket) infoEl.innerHTML = buildTicketInfo(ticket);
      if (usedAt) usedEl.textContent = 'Usada el ' + new Date(usedAt).toLocaleString('es-ES');
    } else {
      overlay.className = 'result-overlay show invalid-bg';
      icon.textContent = '✗';
      status.textContent = errorMsg || 'NO VÁLIDA';
      status.className = 'result-status ko';
      btn.className = 'close-btn ko';
    }

    overlay.style.display = 'flex';
  }

  function buildTicketInfo(t) {
    const rows = [
      ['Nombre', t.buyer_name || '—'],
      ['Acceso', t.ticket_name || t.ticket_type],
      ['Entrada', t.entry_number && t.total_entries ? `#${String(t.entry_number).padStart(4,'0')} de ${t.total_entries}` : '—'],
      ['Escuela', t.school || '—'],
    ];
    return rows.map(([l,v]) => `<div class="ticket-info-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('');
  }

  function closeResult() {
    document.getElementById('result-overlay').style.display = 'none';
    document.getElementById('result-overlay').className = 'result-overlay';
    setTimeout(() => { isProcessing = false; }, 1000);
  }
</script>
</body>
</html>
